services:
  # =========================
  # Milvus 向量数据库（原 vector-database.yml）
  # =========================
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.10
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  # Milvus 管理界面（Attu）
  attu:
    container_name: milvus-attu
    image: zilliz/attu:v2.5
    ports:
      - "8000:3000"
    environment:
      MILVUS_URL: standalone:19530
    depends_on:
      - standalone

  # =========================
  # 腾讯云 CLS MCP Server（本地自建 SSE）
  # =========================
  cls-mcp-server:
    container_name: cls-mcp-server
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-lc", "npx -y cls-mcp-server@latest"]
    environment:
      TRANSPORT: sse
      PORT: "3000"
      TZ: Asia/Shanghai
      # TODO: 填你的腾讯云密钥（建议用 .env 文件注入）
      # TENCENTCLOUD_SECRET_ID: "YOUR_SECRET_ID"
      # TENCENTCLOUD_SECRET_KEY: "YOUR_SECRET_KEY"
      TENCENTCLOUD_SECRET_ID: ${TENCENTCLOUD_SECRET_ID:-}
      TENCENTCLOUD_SECRET_KEY: ${TENCENTCLOUD_SECRET_KEY:-}
      # 如在腾讯云 VPC 内网使用可改为 internal.tencentcloudapi.com
      TENCENTCLOUD_API_BASE_HOST: ${TENCENTCLOUD_API_BASE_HOST:-tencentcloudapi.com}
    ports:
      - "3000:3000"

networks:
  default:
    name: milvus

